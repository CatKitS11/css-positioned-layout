<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://kit.fontawesome.com/bf7220ad33.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
</head>

<body>
  <!-- Start coding here -->
  <div class="chatroom-outer">
    <div class="chatroom-container">
      <header class="chatroom-header">Techup Chatroom</header>
      <div class="chatroom-messages">
        <div class="chat-bubble chat-bubble--right chat-bubble--green">
          <span>สวัสดีจ้า</span>
          <span class="chat-bubble-tail"></span>
        </div>
        <div class="chat-bubble chat-bubble--right chat-bubble--gray">
          <span>Coding สนุกจังเลย</span>
          <button class="chat-bubble-close">×</button>
        </div>
        <div class="chat-bubble chat-bubble--right chat-bubble--green">
          <span class="chat-emoji">🥳</span>
          <span class="chat-emoji">😍</span>
        </div>
        <div class="chat-bubble chat-bubble--left">
          <span class="chat-emoji">😍</span>
        </div>
        <div class="chat-bubble chat-bubble--left">
          <span class="chat-emoji">🥳</span>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
