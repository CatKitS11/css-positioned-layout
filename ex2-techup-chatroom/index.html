<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://kit.fontawesome.com/bf7220ad33.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
</head>

<body>
  <header class="header">
    Techup Chatroom
  </header>
  <main class="chatroom-container">
    <section class="right-chat">
      <div class="chat-bubble me">สวัสดีจ้า</div>
      <div class="chat-bubble you"><span class="close-btn">×</span>Coding สนุกจังเลย</div>
      <div class="emoji-bubble">🥳 😍</div>
    </section>
    <section class="left-emojis">
      <div class="emoji-box">😍</div>
      <div class="emoji-box">🥳</div>
    </section>
    
  </main>
</body>

</html>
